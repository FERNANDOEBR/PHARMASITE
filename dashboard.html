<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pharmasite Intelligence — SP Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #1e2130;
      --surface: #272b3d;
      --surface2: #313550;
      --border: #3d4260;
      --text: #eef0f8;
      --text-muted: #9ea5c0;
      --accent: #6c7bff;
      --accent2: #00d4aa;
      --tier-a: #00d4aa;
      --tier-b: #6c7bff;
      --tier-c: #f5a623;
      --tier-d: #ff5a5a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .logo {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 16px; color: #fff;
    }
    .header h1 { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; }
    .header .subtitle { font-size: 12px; color: var(--text-muted); }
    .status-pill {
      background: rgba(0,212,170,.12);
      color: var(--accent2);
      border: 1px solid rgba(0,212,170,.25);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 12px;
      font-weight: 600;
    }

    /* ── Controls ── */
    .controls {
      padding: 16px 28px;
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .controls label { color: var(--text-muted); font-size: 12px; margin-right: 4px; }
    .controls select, .controls input {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 13px;
      outline: none;
    }
    .controls select:focus, .controls input:focus { border-color: var(--accent); }
    .controls input { width: 200px; }
    .count-badge {
      margin-left: auto;
      color: var(--text-muted);
      font-size: 12px;
    }
    .count-badge span { color: var(--accent2); font-weight: 700; }

    /* ── Main layout ── */
    .main { padding: 24px 28px; display: flex; flex-direction: column; gap: 24px; }

    /* ── KPI row ── */
    .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
    .kpi-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }
    .kpi-label { color: var(--text-muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
    .kpi-value { font-size: 26px; font-weight: 700; letter-spacing: -1px; }
    .kpi-sub { color: var(--text-muted); font-size: 12px; margin-top: 4px; }
    .kpi-accent { color: var(--accent2); }

    /* ── Charts row ── */
    .charts-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }
    .chart-title { font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.6px; }
    .chart-wrap { position: relative; height: 200px; }

    /* ── Table ── */
    .table-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .table-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }
    .table-wrap { overflow-x: auto; max-height: 520px; overflow-y: auto; }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      background: var(--surface2);
      padding: 10px 14px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      position: sticky;
      top: 0;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }
    thead th:hover { color: var(--text); }
    thead th .sort-icon { margin-left: 4px; opacity: 0.5; }
    thead th.sorted .sort-icon { opacity: 1; color: var(--accent); }
    tbody tr { border-bottom: 1px solid var(--border); transition: background .12s; }
    tbody tr:hover { background: var(--surface2); }
    tbody td { padding: 10px 14px; font-size: 13px; }
    .rank { color: var(--text-muted); font-weight: 600; }
    .nome { font-weight: 500; }
    .meso { color: var(--text-muted); font-size: 11px; }

    /* Tier badges */
    .tier {
      display: inline-flex; align-items: center; justify-content: center;
      width: 26px; height: 26px;
      border-radius: 6px;
      font-weight: 700; font-size: 13px;
    }
    .tier-A { background: rgba(0,212,170,.15); color: var(--tier-a); }
    .tier-B { background: rgba(108,123,255,.15); color: var(--tier-b); }
    .tier-C { background: rgba(245,166,35,.15); color: var(--tier-c); }
    .tier-D { background: rgba(255,90,90,.15); color: var(--tier-d); }

    /* Score bar */
    .score-bar-wrap { display: flex; align-items: center; gap: 8px; min-width: 120px; }
    .score-bar-bg { flex: 1; height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
    .score-bar-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width .3s; }
    .score-num { font-weight: 600; font-size: 13px; min-width: 36px; text-align: right; }

    /* Number formatting */
    .num-right { text-align: right; }
    .dim { color: var(--text-muted); }

    /* Loading */
    .loading {
      display: flex; align-items: center; justify-content: center;
      height: 300px; flex-direction: column; gap: 16px;
      color: var(--text-muted);
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Detail panel */
    .detail-panel {
      display: none;
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: 360px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      padding: 24px;
      overflow-y: auto;
      z-index: 200;
      animation: slideIn .2s ease;
    }
    @keyframes slideIn { from { transform: translateX(360px); } to { transform: translateX(0); } }
    .detail-panel.open { display: block; }
    .detail-close {
      position: absolute; top: 16px; right: 16px;
      background: var(--surface2); border: none; color: var(--text);
      width: 28px; height: 28px; border-radius: 6px;
      cursor: pointer; font-size: 16px;
      display: flex; align-items: center; justify-content: center;
    }
    .detail-close:hover { background: var(--border); }
    .detail-name { font-size: 20px; font-weight: 700; margin-bottom: 4px; margin-right: 40px; }
    .detail-meta { color: var(--text-muted); font-size: 12px; margin-bottom: 20px; }
    .detail-score-big { font-size: 48px; font-weight: 800; letter-spacing: -2px; }
    .detail-section { margin-top: 20px; }
    .detail-section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted); margin-bottom: 12px; }
    .detail-row { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid var(--border); }
    .detail-row:last-child { border: none; }
    .detail-row-label { color: var(--text-muted); }
    .detail-row-val { font-weight: 500; }
    .pilar-bars { display: flex; flex-direction: column; gap: 10px; margin-top: 12px; }
    .pilar-row { display: flex; flex-direction: column; gap: 4px; }
    .pilar-label-row { display: flex; justify-content: space-between; font-size: 12px; }
    .pilar-label { color: var(--text-muted); }
    .pilar-bar-bg { height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
    .pilar-bar-fill { height: 100%; border-radius: 4px; }
    .pilar-demo { background: #6c7bff; }
    .pilar-log  { background: #00d4aa; }
    .pilar-eco  { background: #f5a623; }
    .pilar-sau  { background: #ff7eb3; }

    @media (max-width: 900px) {
      .kpi-row { grid-template-columns: repeat(2, 1fr); }
      .charts-row { grid-template-columns: 1fr; }
    }
  </style>
</head>

let ALL_DATA = [];
let filteredData = [];
let sortKey = 'ranking';
let sortAsc = true;

async function loadData() {
  // First try the API (works when served from same origin)
  try {
    const ctrl = new AbortController();
    const timeout = setTimeout(() => ctrl.abort(), 1500);
    const res = await fetch(`${API}/municipios`, { signal: ctrl.signal });
    clearTimeout(timeout);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const j = await res.json();
    ALL_DATA = j.municipios || j;
    document.getElementById('api-status').textContent = `✅ API online — ${ALL_DATA.length} municípios`;
    document.getElementById('api-status').style.background = 'rgba(0,212,170,.12)';
    document.getElementById('api-status').style.color = 'var(--tier-a)';
  } catch (e) {
    // Fallback to embedded data
    ALL_DATA = EMBEDDED_DATA;
    document.getElementById('api-status').textContent = `📦 Dados embutidos — ${ALL_DATA.length} municípios`;
    document.getElementById('api-status').style.background = 'rgba(108,123,255,.12)';
    document.getElementById('api-status').style.color = 'var(--tier-b)';
  }
  populateMesoFilter();
  render();
}


// ── Filters ──────────────────────────────────────────────────────────────────
function populateMesoFilter() {
  const mesos = [...new Set(ALL_DATA.map(d => d.mesorregiao).filter(Boolean))].sort();
  const sel = document.getElementById('filter-meso');
  mesos.forEach(m => {
    const opt = document.createElement('option');
    opt.value = m; opt.textContent = m;
    sel.appendChild(opt);
  });
}

function getFiltered() {
  const tier  = document.getElementById('filter-tier').value;
  const meso  = document.getElementById('filter-meso').value;
  const q     = document.getElementById('search').value.toLowerCase().trim();
  return ALL_DATA.filter(d => {
    if (tier && d.tier !== tier) return false;
    if (meso && d.mesorregiao !== meso) return false;
    if (q && !d.nome.toLowerCase().includes(q) && !d.microrregiao?.toLowerCase().includes(q)) return false;
    return true;
  });
}

function getSorted(data) {
  return [...data].sort((a, b) => {
    const va = a[sortKey] ?? 0, vb = b[sortKey] ?? 0;
    return sortAsc ? va - vb : vb - va;
  });
}

// ── Render ───────────────────────────────────────────────────────────────────
function render() {
  filteredData = getSorted(getFiltered());
  document.getElementById('count-shown').textContent = filteredData.length;
  document.getElementById('count-total').textContent = ALL_DATA.length;

  const main = document.getElementById('main-content');
  main.innerHTML = '';

  // KPIs
  const tierCounts = { A: 0, B: 0, C: 0, D: 0 };
  filteredData.forEach(d => tierCounts[d.tier] = (tierCounts[d.tier] || 0) + 1);
  const totalPop = filteredData.reduce((s, d) => s + (d.populacao_total || 0), 0);
  const avgScore = filteredData.length ? (filteredData.reduce((s,d)=>s+(d.score||0),0)/filteredData.length) : 0;
  const totalFarm = filteredData.reduce((s,d) => s+(d.farmacias||0), 0);

  main.innerHTML += `
  <div class="kpi-row">
    <div class="kpi-card">
      <div class="kpi-label">Municípios</div>
      <div class="kpi-value kpi-accent">${filteredData.length.toLocaleString('pt-BR')}</div>
      <div class="kpi-sub">${tierCounts.A||0} Tier A · ${tierCounts.B||0} B · ${tierCounts.C||0} C · ${tierCounts.D||0} D</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Score Médio</div>
      <div class="kpi-value">${avgScore.toFixed(1)}</div>
      <div class="kpi-sub">max ${filteredData[0]?.score || 0} · min ${filteredData.at(-1)?.score || 0}</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">População Total</div>
      <div class="kpi-value">${(totalPop/1e6).toFixed(1)}<span style="font-size:16px;color:var(--text-muted)">M</span></div>
      <div class="kpi-sub">habitantes nos municípios filtrados</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Farmácias Mapeadas</div>
      <div class="kpi-value">${totalFarm.toLocaleString('pt-BR')}</div>
      <div class="kpi-sub">establ. nos municípios filtrados</div>
    </div>
  </div>`;

  // Charts
  main.innerHTML += `
  <div class="charts-row">
    <div class="chart-card">
      <div class="chart-title">Distribuição por Tier</div>
      <div class="chart-wrap"><canvas id="chart-tier"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Score vs. Distância (Campinas)</div>
      <div class="chart-wrap"><canvas id="chart-scatter"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Score vs. Renda per Capita</div>
      <div class="chart-wrap"><canvas id="chart-renda"></canvas></div>
    </div>
  </div>`;

  // Table
  main.innerHTML += `
  <div class="table-card">
    <div class="table-header">Ranking de Municípios — clique numa linha para detalhes</div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th onclick="setSort('ranking')" class="${sortKey==='ranking'?'sorted':''}">Rank <span class="sort-icon">${sortKey==='ranking'?(sortAsc?'↑':'↓'):'↕'}</span></th>
            <th>Município</th>
            <th onclick="setSort('score')" class="${sortKey==='score'?'sorted':''}">Score <span class="sort-icon">${sortKey==='score'?(sortAsc?'↑':'↓'):'↕'}</span></th>
            <th>Tier</th>
            <th onclick="setSort('populacao_total')" class="${sortKey==='populacao_total'?'sorted':''}">População <span class="sort-icon">${sortKey==='populacao_total'?(sortAsc?'↑':'↓'):'↕'}</span></th>
            <th onclick="setSort('farmacias')" class="${sortKey==='farmacias'?'sorted':''}">Farmácias <span class="sort-icon">${sortKey==='farmacias'?(sortAsc?'↑':'↓'):'↕'}</span></th>
            <th onclick="setSort('renda_per_capita')" class="${sortKey==='renda_per_capita'?'sorted':''}">Renda R$ <span class="sort-icon">${sortKey==='renda_per_capita'?(sortAsc?'↑':'↓'):'↕'}</span></th>
            <th onclick="setSort('distance_campinas_km')" class="${sortKey==='distance_campinas_km'?'sorted':''}">Dist. KM <span class="sort-icon">${sortKey==='distance_campinas_km'?(sortAsc?'↑':'↓'):'↕'}</span></th>
            <th onclick="setSort('idh')" class="${sortKey==='idh'?'sorted':''}">IDH <span class="sort-icon">${sortKey==='idh'?(sortAsc?'↑':'↓'):'↕'}</span></th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </div>`;

  // Fill table (first 200 rows)
  const tbody = document.getElementById('table-body');
  const display = filteredData.slice(0, 200);
  display.forEach(d => {
    const tr = document.createElement('tr');
    tr.style.cursor = 'pointer';
    tr.onclick = () => openDetail(d);
    const pct = Math.min(100, (d.score / 90) * 100);
    tr.innerHTML = `
      <td class="rank">#${d.ranking}</td>
      <td><div class="nome">${d.nome}</div><div class="meso">${d.microrregiao || ''}</div></td>
      <td>
        <div class="score-bar-wrap">
          <div class="score-bar-bg"><div class="score-bar-fill" style="width:${pct}%"></div></div>
          <div class="score-num">${d.score}</div>
        </div>
      </td>
      <td><span class="tier tier-${d.tier}">${d.tier}</span></td>
      <td class="num-right">${(d.populacao_total||0).toLocaleString('pt-BR')}</td>
      <td class="num-right">${d.farmacias||0}</td>
      <td class="num-right">R$ ${(d.renda_per_capita||0).toLocaleString('pt-BR',{maximumFractionDigits:0})}</td>
      <td class="num-right dim">${(d.distance_campinas_km||0).toFixed(0)} km</td>
      <td class="num-right">${d.idh?.toFixed(3) || '—'}</td>
    `;
    tbody.appendChild(tr);
  });
  if (filteredData.length > 200) {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td colspan="9" style="text-align:center;color:var(--text-muted);padding:12px">… e mais ${filteredData.length-200} municípios (refine os filtros para ver todos)</td>`;
    tbody.appendChild(tr);
  }

  // Charts
  renderCharts(filteredData);
}

function renderCharts(data) {
  const tierColors = { A: '#00d4aa', B: '#6c7bff', C: '#f5a623', D: '#ff5a5a' };
  const tiers = ['A','B','C','D'];
  const tierCounts = tiers.map(t => data.filter(d=>d.tier===t).length);

  // Tier donut
  new Chart(document.getElementById('chart-tier'), {
    type: 'doughnut',
    data: {
      labels: tiers.map(t => `Tier ${t}`),
      datasets: [{ data: tierCounts, backgroundColor: tiers.map(t=>tierColors[t]), borderWidth: 0, hoverOffset: 6 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: 'right', labels: { color: '#8b90a8', font: { size: 12 }, boxWidth: 12 } },
        tooltip: { callbacks: { label: ctx => `${ctx.label}: ${ctx.raw} municípios` } }
      }
    }
  });

  // Scatter: score vs distância
  const sample = data.filter(d => d.score && d.distance_campinas_km).slice(0, 300);
  const scatterData = sample.map(d => ({ x: d.distance_campinas_km, y: d.score, label: d.nome, tier: d.tier }));
  const tierGroups = tiers.map(t => ({
    label: `Tier ${t}`,
    data: scatterData.filter(p => p.tier === t),
    backgroundColor: tierColors[t]+'aa',
    pointRadius: 4, pointHoverRadius: 6
  }));
  new Chart(document.getElementById('chart-scatter'), {
    type: 'scatter',
    data: { datasets: tierGroups },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { labels: { color: '#8b90a8', font: { size: 11 }, boxWidth: 10 } },
        tooltip: { callbacks: { label: ctx => `${ctx.raw.label}: score ${ctx.raw.y} | ${ctx.raw.x.toFixed(0)} km` } }
      },
      scales: {
        x: { title: { display: true, text: 'Distância de Campinas (km)', color: '#8b90a8' }, ticks: { color: '#8b90a8' }, grid: { color: '#2e3248' } },
        y: { title: { display: true, text: 'Score', color: '#8b90a8' }, ticks: { color: '#8b90a8' }, grid: { color: '#2e3248' } }
      }
    }
  });

  // Scatter: score vs renda
  const rendaSample = data.filter(d => d.score && d.renda_per_capita).slice(0, 300);
  const rendaGroups = tiers.map(t => ({
    label: `Tier ${t}`,
    data: rendaSample.filter(d=>d.tier===t).map(d => ({ x: d.renda_per_capita, y: d.score, label: d.nome })),
    backgroundColor: tierColors[t]+'aa',
    pointRadius: 4, pointHoverRadius: 6
  }));
  new Chart(document.getElementById('chart-renda'), {
    type: 'scatter',
    data: { datasets: rendaGroups },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { labels: { color: '#8b90a8', font: { size: 11 }, boxWidth: 10 } },
        tooltip: { callbacks: { label: ctx => `${ctx.raw.label}: score ${ctx.raw.y} | R$ ${ctx.raw.x}` } }
      },
      scales: {
        x: { title: { display: true, text: 'Renda per capita (R$)', color: '#8b90a8' }, ticks: { color: '#8b90a8' }, grid: { color: '#2e3248' } },
        y: { title: { display: true, text: 'Score', color: '#8b90a8' }, ticks: { color: '#8b90a8' }, grid: { color: '#2e3248' } }
      }
    }
  });
}

// ── Detail panel ─────────────────────────────────────────────────────────────
function openDetail(d) {
  const panel = document.getElementById('detail-panel');
  const tierColor = { A:'var(--tier-a)', B:'var(--tier-b)', C:'var(--tier-c)', D:'var(--tier-d)' }[d.tier];
  document.getElementById('detail-content').innerHTML = `
    <div class="detail-name">${d.nome}</div>
    <div class="detail-meta">${d.mesorregiao} › ${d.microrregiao || ''} · Código IBGE: ${d.codigo_ibge}</div>
    <div style="display:flex;align-items:baseline;gap:12px;margin-bottom:8px">
      <div class="detail-score-big" style="color:${tierColor}">${d.score}</div>
      <span class="tier tier-${d.tier}" style="font-size:16px;width:36px;height:36px">${d.tier}</span>
      <div style="color:var(--text-muted)">Rank #${d.ranking} / ${ALL_DATA.length}</div>
    </div>

    <div class="detail-section">
      <div class="detail-section-title">Scores por Pilar</div>
      <div class="pilar-bars">
        ${[['Demográfico','score_demografico','pilar-demo'],['Logística','score_logistica','pilar-log'],['Econômico','score_economico','pilar-eco'],['Saúde','score_saude','pilar-sau']].map(([label, key, cls]) => `
        <div class="pilar-row">
          <div class="pilar-label-row"><span class="pilar-label">${label}</span><span>${(d[key]||0).toFixed(1)}</span></div>
          <div class="pilar-bar-bg"><div class="pilar-bar-fill ${cls}" style="width:${d[key]||0}%"></div></div>
        </div>`).join('')}
      </div>
    </div>

    <div class="detail-section">
      <div class="detail-section-title">Dados Demográficos</div>
      ${row('População total', (d.populacao_total||0).toLocaleString('pt-BR'))}
      ${row('Pop. alvo (30–64)', Math.round(d.populacao_alvo||0).toLocaleString('pt-BR'))}
      ${row('Urbanização', (d.taxa_urbanizacao||0).toFixed(1)+'%')}
      ${row('Índice envelhecimento', (d.indice_envelhecimento||0).toFixed(0))}
    </div>

    <div class="detail-section">
      <div class="detail-section-title">Saúde & Infraestrutura</div>
      ${row('Farmácias', d.farmacias||0)}
      ${row('Farm. por 10k hab.', (d.farmacias_por_10k||0).toFixed(2))}
      ${row('Consultórios odonto', d.consultorios_odonto||0)}
      ${row('Laboratórios', d.laboratorios||0)}
      ${row('Clínicas', d.clinicas||0)}
      ${row('Hospitais', d.hospitais||0)}
    </div>

    <div class="detail-section">
      <div class="detail-section-title">Economia</div>
      ${row('Renda per capita', 'R$ '+(d.renda_per_capita||0).toLocaleString('pt-BR',{maximumFractionDigits:0}))}
      ${row('PIB per capita', 'R$ '+(d.pib_per_capita||0).toLocaleString('pt-BR',{maximumFractionDigits:0}))}
      ${row('IDH', d.idh?.toFixed(3)||'—')}
      ${row('Cobertura planos', (d.cobertura_planos_pct||0).toFixed(1)+'%')}
    </div>

    <div class="detail-section">
      <div class="detail-section-title">Logística</div>
      ${row('Dist. Campinas', (d.distance_campinas_km||0).toFixed(0)+' km')}
      ${row('Score logístico', (d.score_logistico||d.score_logistica||0).toFixed(1))}
      ${d.latitude ? row('Coordenadas', `${(d.latitude).toFixed(4)}, ${(d.longitude).toFixed(4)}`) : ''}
    </div>

    <div class="detail-section" style="margin-top:20px; border-top:1px solid var(--border); padding-top:16px;">
      <div class="detail-section-title" style="display:flex; justify-content:space-between; align-items:flex-start; flex-direction:column; gap:8px;">
        <span style="font-size:14px; color:var(--text);">Agent Scout 📡 <span style="font-size:11px; font-weight:normal; color:var(--text-muted);">(Inteligência Artificial)</span></span>
        ${d.farmacias === 0 ? '<div style="background:rgba(239,68,68,0.1); border-left:3px solid var(--red); padding:8px 10px; font-size:12px; color:var(--text); width:100%; margin-bottom:4px;"><b>⚠️ CNES indicou 0 farmácias oficiais.</b><br/>Pequenos municípios muitas vezes têm PDVs não registrados na saúde. Ative o Agent Scout abaixo para verificar Google Maps e dados reais.</div>' : ''}
        
        <div style="display:flex; gap:8px; width:100%;">
          <button id="btn-ai-${d.codigo_ibge}" onclick="gerarAnalise('${d.codigo_ibge}')" style="flex:1; background:var(--accent); color:#fff; border:none; border-radius:4px; padding:8px 14px; font-size:12px; font-weight:600; cursor:pointer;">
            🔍 Buscar Crescimento e Validar com Agent Scout
          </button>
          
          ${d.nome.toLowerCase() === 'campinas' ? '<a href="l2_campinas.html" target="_blank" style="text-decoration:none; display:inline-flex; align-items:center; justify-content:center; background:#22c55e; color:#fff; border:none; border-radius:4px; padding:8px 14px; font-size:12px; font-weight:600; cursor:pointer;">🗺️ Abrir L2 Proxy</a>' : ''}
        </div>
      </div>
      <div id="ai-content-${d.codigo_ibge}" style="margin-top:12px; font-size:13px; color:var(--text-muted); line-height:1.6; white-space:pre-wrap;">
        <i style="font-size:12px">Clique acima para o agente vasculhar a internet e cruzar dados socioeconômicos.</i>
      </div>
    </div>
  `;
  panel.classList.add('open');
}

async function gerarAnalise(codigo) {
  const btn = document.getElementById(`btn-ai-${codigo}`);
  const content = document.getElementById(`ai-content-${codigo}`);
  btn.disabled = true;
  btn.innerText = '⏳ Analisando...';
  content.innerHTML = '<span style="color:var(--accent)">Orquestrando conhecimentos demográficos e de mercado na nuvem...</span>';
  
  try {
    const res = await fetch(`http://localhost:8002/analise/${codigo}`, { method: 'POST' });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Falha na API');
    
    // Mostra o resultado mantendo quebras de linha
    content.innerHTML = `<div style="color:var(--text); padding:12px; background:var(--surface2); border-radius:6px; border-left:3px solid var(--accent2);">${data.analise}</div>
    <div style="font-size:10px; text-align:right; margin-top:8px; color:var(--border);">Gerado por ${data.model}</div>`;
  } catch(e) {
    content.innerHTML = `<span style="color:var(--tier-d)">Erro: ${e.message}</span>`;
  } finally {
    btn.style.display = 'none';
  }
}

function row(label, val) {
  return `<div class="detail-row"><span class="detail-row-label">${label}</span><span class="detail-row-val">${val}</span></div>`;
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('open');
}

// ── Sort & filter wiring ─────────────────────────────────────────────────────
function setSort(key) {
  if (sortKey === key) sortAsc = !sortAsc;
  else { sortKey = key; sortAsc = key === 'ranking'; }
  document.getElementById('sort-col').value = key;
  render();
}

document.getElementById('filter-tier').addEventListener('change', render);
document.getElementById('filter-meso').addEventListener('change', render);
document.getElementById('search').addEventListener('input', render);
document.getElementById('sort-col').addEventListener('change', e => { sortKey = e.target.value; render(); });

// ── Init ─────────────────────────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
